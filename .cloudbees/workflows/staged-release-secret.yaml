{
  "apiVersion": "automation.cloudbees.io/v1alpha1",
  "kind": "workflow",
  "name": "staged-release",
  "on": {
    "workflow_dispatch": null
  },
  "metadata": {
    "stages/v1alpha1": [
      {
        "name": "Release Readiness",
        "jobs": [
          "checkout-and-sast-scan",
          "policy-check-release-readiness",
          "policy-check-container-release-readiness",
          "policy-check-gitleaks"
        ]
      },
      {
        "name": "Quality Assurance",
        "jobs": [
          "policy-check-approval"
        ]
      },
      {
        "name": "Staging",
        "jobs": [
          "create-release",
          "argocd-deploy",
          "enable-beta-features",
          "smoke-tests",
          "rollback-check",
          "policy-check-staging"
        ]
      },
      {
        "name": "Production",
        "jobs": [
          "servicenow-approval",
          "blue-green-deploy",
          "prod-smoke-tests",
          "gradual-feature-rollout",
          "policy-check-production"
        ]
      }
    ]
  },
  "jobs": {
    "checkout-and-sast-scan": {
      "outputs": {
        "snyk-policy-subject": "${{ steps.snyk-sast-scan.outputs.policy-subject }}",
        "gitleaks-policy-subject": "${{ steps.gitleaks-step.outputs.policy-subject }}"
      },
      "steps": [
        {
          "name": "Checkout Component 1",
          "uses": "cloudbees-io/checkout@v2",
          "with": {
            "provider": "github",
            "repository": "https://github.com/Dev-Org-Hari/webrtc-go",
            "ref": "main",
            "path": "webrtc-repo"
          }
        },
        {
          "name": "Run Snyk Sast Scan",
          "id": "snyk-sast-scan",
          "uses": "cloudbees-io/snyk-sast-plugin@v1",
          "with": {
            "snyk-token": "b805f82c-36ef-4f7d-aee5-16bfaa718f75",
            "org-id": "cloudbees-compliance-partner-development",
            "workspace-dir": "webrtc-repo"
          }
        },
        {
          "name": "Print Snyk Policy Subject",
          "uses": "docker://alpine:3.20",
          "run": "echo \"Policy Subject: ${{ steps.snyk-sast-scan.outputs.policy-subject }}\"\n"
        },
        {
          "name": "Run Gitleaks Scan",
          "id": "gitleaks-step",
          "uses": "cloudbees-io/gitleaks-plugin@v1",
          "with": {
            "workspace-dir": "webrtc-repo"
          }
        },
        {
          "name": "Print Gitleaks Outputs",
          "id": "print-gitleaks-outputs",
          "uses": "docker://alpine:latest",
          "run": "echo \"Gitleaks outputs:\"\necho \"Critical: ${{ steps.gitleaks-step.outputs.critical-count }}\"\necho \"Very high: ${{ steps.gitleaks-step.outputs.very-high-count }}\"\necho \"High: ${{ steps.gitleaks-step.outputs.high-count }}\"\necho \"Medium: ${{ steps.gitleaks-step.outputs.medium-count }}\"\necho \"Low: ${{ steps.gitleaks-step.outputs.low-count }}\"\necho \"Policy Subject: ${{ steps.gitleaks-step.outputs.policy-subject }}\"\necho \"CLOUDBEES_OUTPUTS directory: $CLOUDBEES_OUTPUTS\"\n"
        },
        {
          "name": "Print Gitleaks Policy Subject",
          "id": "print-policy-subject",
          "uses": "docker://alpine:latest",
          "run": "echo \"=== Files in /cloudbees/workspace/policy-store ===\"\nfind \"/cloudbees/workspace/policy-store\" -type f | while read file; do\n  echo \"\"\n  echo \"File: $file\"\n  cat \"$file\"\n  echo \"---\"\ndone\n"
        }
      ]
    },
    "policy-check-release-readiness": {
      "needs": "checkout-and-sast-scan",
      "uses": "cloudbees-io/policy-utils/.cloudbees/workflows/action.yaml@main",
      "with": {
        "policy-id": "0869cf46-8f4a-4c70-ba66-c4efa79a6bab",
        "input-data": "${{ needs.checkout-and-sast-scan.outputs.snyk-policy-subject }}"
      },
      "secrets": "inherit"
    },
    "policy-check-container-release-readiness": {
      "needs": [
        "policy-check-release-readiness",
        "checkout-and-sast-scan"
      ],
      "uses": "cloudbees-io/policy-utils/.cloudbees/workflows/action.yaml@main",
      "with": {
        "policy-id": "0869cf46-8f4a-4c70-ba66-c4efa79a6bab",
        "input-data": "${{ needs.checkout-and-sast-scan.outputs.snyk-policy-subject }}"
      },
      "secrets": "inherit"
    },
    "policy-check-gitleaks": {
      "needs": "checkout-and-sast-scan",
      "uses": "cloudbees-io/policy-utils/.cloudbees/workflows/action.yaml@main",
      "with": {
        "policy-id": "257422b9-4dff-4f19-9e69-9eab1b5c0895",
        "input-data": "${{ needs.checkout-and-sast-scan.outputs.gitleaks-policy-subject }}"
      },
      "secrets": "inherit"
    },
    "create-release": {
      "needs": "policy-check-approval",
      "steps": [
        {
          "uses": "docker://alpine:3.20",
          "run": "echo \"Creating release for staging\""
        }
      ]
    },
    "argocd-deploy": {
      "needs": "create-release",
      "steps": [
        {
          "uses": "docker://alpine:3.20",
          "run": "echo \"Deploying to staging via ArgoCD\""
        }
      ]
    },
    "enable-beta-features": {
      "needs": "create-release",
      "steps": [
        {
          "uses": "docker://alpine:3.20",
          "run": "echo \"Enabling beta features in staging\""
        }
      ]
    },
    "smoke-tests": {
      "needs": [
        "argocd-deploy",
        "enable-beta-features"
      ],
      "steps": [
        {
          "uses": "docker://alpine:3.20",
          "run": "echo \"Running smoke tests on staging\""
        }
      ]
    },
    "rollback-check": {
      "needs": [
        "argocd-deploy",
        "enable-beta-features"
      ],
      "steps": [
        {
          "uses": "docker://alpine:3.20",
          "run": "echo \"Running rollback check on staging\""
        }
      ]
    },
    "policy-check-staging": {
      "needs": [
        "smoke-tests",
        "rollback-check"
      ],
      "steps": [
        {
          "uses": "docker://alpine:3.20",
          "run": "echo \"Evaluating policies - Production Readiness (PAUSE & NOTIFY)\""
        }
      ]
    },
    "servicenow-approval": {
      "needs": "policy-check-staging",
      "steps": [
        {
          "uses": "docker://alpine:3.20",
          "run": "echo \"ServiceNow approval submitted\""
        }
      ]
    },
    "blue-green-deploy": {
      "needs": "servicenow-approval",
      "steps": [
        {
          "uses": "docker://alpine:3.20",
          "run": "echo \"Running blue-green deployment to production\""
        }
      ]
    },
    "prod-smoke-tests": {
      "needs": "blue-green-deploy",
      "steps": [
        {
          "uses": "docker://alpine:3.20",
          "run": "echo \"Running production smoke tests\""
        }
      ]
    },
    "gradual-feature-rollout": {
      "needs": "blue-green-deploy",
      "steps": [
        {
          "uses": "docker://alpine:3.20",
          "run": "echo \"Gradual feature rollout in production\""
        }
      ]
    },
    "policy-check-production": {
      "needs": [
        "prod-smoke-tests",
        "gradual-feature-rollout"
      ],
      "steps": [
        {
          "uses": "docker://alpine:3.20",
          "run": "echo \"Evaluating policies - Production deployment complete\""
        }
      ]
    },
    "policy-check-approval": {
      "needs": [
        "checkout-and-sast-scan",
        "policy-check-release-readiness",
        "policy-check-container-release-readiness",
        "policy-check-gitleaks"
      ],
      "uses": "cloudbees-io/policy-utils/.cloudbees/workflows/action.yaml@main",
      "with": {
        "policy-id": "fcfe43c5-021f-46d8-826a-4267b1123200",
        "input-data": "${{ needs.checkout-and-sast-scan.outputs.snyk-policy-subject }}"
      },
      "secrets": "inherit"
    }
  }
}
